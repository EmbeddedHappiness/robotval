<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RobotVal.se – Hitta rätt robotgräsklippare</title>
  <meta name="description" content="Hitta rätt robotgräsklippare på 60 sekunder.">
  <style>
    :root{
      --bg:#f8fbf8;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --line:#e2e8f0;
      --green:#10b981;
      --green-dark:#047857;
      --dark:#0f172a;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --max:1100px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
    }

    a{text-decoration:none;color:inherit}
    button{font:inherit}

    [hidden]{display:none !important}

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(16,185,129,.12), transparent 35%),
        linear-gradient(to bottom, #ecfdf5, #ffffff 45%);
      border-bottom:1px solid var(--line);
      padding:20px 0 52px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:8px 0 20px;
    }

    .brand{
      display:inline-flex;
      align-items:center;
      background:#fff;
      border:1px solid #bbf7d0;
      color:var(--green-dark);
      padding:10px 14px;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
      box-shadow:var(--shadow);
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:28px;
      align-items:center;
    }

    .eyebrow{
      color:var(--green-dark);
      text-transform:uppercase;
      letter-spacing:.22em;
      font-size:12px;
      font-weight:800;
    }

    h1{
      margin:14px 0 0;
      font-size:clamp(38px, 7vw, 62px);
      line-height:1.02;
      letter-spacing:-0.03em;
    }

    .lead{
      margin:20px 0 0;
      max-width:650px;
      font-size:clamp(18px, 3vw, 22px);
      color:var(--muted);
      line-height:1.7;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:28px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 20px;
      border-radius:18px;
      font-weight:700;
      font-size:16px;
      border:1px solid transparent;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--dark);
      color:#fff;
      box-shadow:var(--shadow);
    }

    .btn-secondary{
      background:#fff;
      color:#334155;
      border-color:#cbd5e1;
    }

    .trust-row{
      margin-top:24px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .trust-pill{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 16px;
      text-align:center;
      font-size:14px;
      font-weight:600;
      color:#334155;
      box-shadow:var(--shadow);
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      padding:20px;
      box-shadow:0 24px 50px rgba(15,23,42,.10);
    }

    .card-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      padding-bottom:14px;
      border-bottom:1px solid #f1f5f9;
    }

    .muted{
      color:#64748b;
      font-size:14px;
      margin:0 0 6px;
    }

    h2{
      margin:0;
      font-size:24px;
      line-height:1.2;
    }

    .badge{
      background:#d1fae5;
      color:var(--green-dark);
      font-size:13px;
      font-weight:700;
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
    }

    .example-list{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:16px;
    }

    .example-item{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }

    .example-item h3{
      margin:0;
      font-size:17px;
    }

    .example-item p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
    }

    .section{
      padding:60px 0;
    }

    .section-alt{
      background:#f8fafc;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
    }

    .section-title{
      max-width:760px;
      margin-bottom:24px;
    }

    .section-title h2{
      margin-top:10px;
      font-size:clamp(30px, 4vw, 42px);
      letter-spacing:-0.02em;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .info-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      padding:22px;
      box-shadow:var(--shadow);
    }

    .info-card h3{
      margin:0;
      font-size:20px;
    }

    .info-card p{
      margin:12px 0 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
    }

    .step-num{
      width:40px;
      height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:#d1fae5;
      color:var(--green-dark);
      font-weight:800;
      margin-bottom:14px;
    }

    .wizard-wrap{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:22px;
      align-items:start;
      margin-top:24px;
    }

    .wizard-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px;
      box-shadow:0 24px 50px rgba(15,23,42,.08);
    }

    .wizard-side{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .mini-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .mini-card h3{
      margin:0 0 10px;
      font-size:18px;
    }

    .mini-card p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .answers-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .answer-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:8px 0;
      border-bottom:1px solid #f1f5f9;
      font-size:14px;
    }

    .answer-row:last-child{border-bottom:none}

    .answer-label{color:#64748b}
    .answer-value{font-weight:700;color:#0f172a;text-align:right}

    .progress-meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
      color:#64748b;
      margin-bottom:12px;
    }

    .progress{
      width:100%;
      height:12px;
      background:#e2e8f0;
      border-radius:999px;
      overflow:hidden;
      margin-bottom:22px;
    }

    .progress-bar{
      height:100%;
      background:linear-gradient(90deg, #34d399, #10b981);
      width:20%;
      transition:width .25s ease;
    }

    .question{
      font-size:28px;
      font-weight:800;
      line-height:1.2;
      margin:0 0 16px;
      letter-spacing:-0.02em;
    }

    .option-grid{
      display:grid;
      gap:12px;
    }

    .option{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      color:#0f172a;
      border-radius:18px;
      padding:16px;
      font-weight:700;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(15,23,42,.04);
    }

    .option:hover{
      border-color:#86efac;
      background:#f0fdf4;
    }

    .results-grid{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:16px;
    }

    .result-card{
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      background:#fff;
      box-shadow:0 10px 24px rgba(15,23,42,.05);
    }

    .result-card h4{
      margin:0;
      font-size:20px;
    }

    .result-card p{
      margin:10px 0 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
    }

    .result-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:12px;
    }

    .tag{
      background:#ecfdf5;
      color:#065f46;
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .result-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:20px;
    }

    .footer{
      border-top:1px solid var(--line);
      padding:22px 0 34px;
      color:#64748b;
      font-size:14px;
    }

    .footer-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    @media (max-width: 860px){
      .hero-grid,
      .trust-row,
      .grid-3,
      .wizard-wrap{
        grid-template-columns:1fr;
      }

      .card
